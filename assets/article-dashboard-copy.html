<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KK读电镜文献｜公众号数据分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --accent: #07c160;
      --accent-dark: #058b48;
      --accent-soft: #e8f8ef;
      --ink: #111c16;
      --muted: #607168;
      --line: #dbe8e1;
      --paper: #f6faf8;
      --panel: #ffffff;
      --panel-soft: #fbfdfc;
      --blue: #2563eb;
      --amber: #e89a18;
      --rose: #d9486e;
      --shadow: 0 20px 60px rgba(12, 34, 23, .08);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(7, 193, 96, .10), transparent 34rem),
        radial-gradient(circle at 85% 10%, rgba(37, 99, 235, .08), transparent 26rem),
        var(--paper);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .shell { width: min(1440px, 100%); margin: 0 auto; padding: 24px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, .75fr);
      gap: 22px;
      align-items: stretch;
      min-height: 310px;
      margin-bottom: 18px;
    }
    .hero-main {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.82);
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 42px);
      position: relative;
      overflow: hidden;
    }
    .hero-main::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      right: -90px;
      top: -90px;
      background: radial-gradient(circle, rgba(7,193,96,.22), transparent 62%);
      pointer-events: none;
    }
    .brand { color: var(--accent-dark); font-size: 14px; font-weight: 800; margin-bottom: 18px; }
    h1 { margin: 0; font-size: clamp(34px, 5vw, 64px); letter-spacing: 0; line-height: 1.02; max-width: 760px; }
    .hero-copy { margin: 18px 0 0; max-width: 720px; color: var(--muted); line-height: 1.7; font-size: 16px; }
    .hero-side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #10251a;
      color: white;
      padding: 22px;
      display: grid;
      align-content: space-between;
      box-shadow: var(--shadow);
    }
    .hero-side .small { color: rgba(255,255,255,.7); line-height: 1.6; }
    .hero-side strong { font-size: clamp(34px, 4vw, 54px); line-height: 1; }
    .hero-side .account-name { font-size: clamp(30px, 4vw, 48px); letter-spacing: 0; }
    .hero-side .tag { color: #9ef1c3; font-weight: 800; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr 1fr 1.2fr;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    select, input {
      width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 11px;
      background: white; color: var(--ink); font: inherit; outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(7,193,96,.14); }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat {
      border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel);
      padding: 18px; box-shadow: var(--shadow); min-height: 118px;
    }
    .stat .name { color: var(--muted); font-size: 13px; }
    .stat .value { margin-top: 10px; font-weight: 880; font-size: clamp(25px, 3vw, 38px); }
    .stat .note { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .section { margin-top: 16px; }
    .grid { display: grid; grid-template-columns: 1.25fr .85fr; gap: 16px; align-items: start; }
    .panel { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow); padding: 18px; }
    .panel h2 { margin: 0 0 14px; font-size: 20px; line-height: 1.2; }
    .chart { height: 350px; position: relative; }
    .chart.short { height: 300px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 13px; line-height: 1.45; }
    th { background: #f8fbf9; color: var(--muted); font-size: 12px; font-weight: 800; position: sticky; top: 0; }
    tr:last-child td { border-bottom: 0; }
    .rank { color: var(--accent-dark); font-weight: 900; }
    .title-cell { max-width: 390px; }
    .pill { display: inline-flex; border-radius: 999px; background: var(--accent-soft); color: var(--accent-dark); padding: 5px 8px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .strategy { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .list li { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel-soft); padding: 13px; line-height: 1.62; }
    .fit { border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(135deg, #fbfdfc, #eefaf3); padding: 16px; line-height: 1.75; }
    .status-line { color: var(--muted); font-size: 12px; margin-top: 8px; }
    @media (max-width: 1080px) {
      .hero, .grid, .strategy { grid-template-columns: 1fr; }
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .shell { padding: 16px; }
      .controls, .stats { grid-template-columns: 1fr; }
      .panel { padding: 14px; }
      .chart { height: 310px; }
      .hero-main, .hero-side { padding: 20px; }
      table { min-width: 880px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-main">
        <h1>公众号数据分析</h1>
        <p class="hero-copy">从阅读、分享、阅读后关注和完读率四个角度，判断哪些电镜与材料内容真正值得继续投入。</p>
      </div>
      <aside class="hero-side">
        <div>
          <div class="small">微信公众号</div>
          <strong class="account-name">KK读电镜文献</strong>
          <div class="status-line" id="heroTopTitle">文章级数据看板</div>
        </div>
        <div class="tag" id="heroStatus">正在读取数据</div>
      </aside>
    </section>

    <section class="controls">
      <div><label>时间范围</label><select id="monthFilter"></select></div>
      <div><label>研究方向</label><select id="directionFilter"></select></div>
      <div><label>内容类型</label><select id="typeFilter"></select></div>
      <div><label>排行榜依据</label><select id="rankBy"><option value="read">阅读人数</option><option value="follow">新增粉丝</option><option value="followRate">关注率</option><option value="share">分享人数</option><option value="completionRate">完读率</option></select></div>
      <div><label>搜索文章</label><input id="searchBox" placeholder="输入标题关键词"></div>
    </section>

    <section class="stats">
      <div class="stat"><div class="name">累计粉丝</div><div class="value" id="fansNow">--</div></div>
      <div class="stat"><div class="name">总阅读</div><div class="value" id="totalRead">--</div></div>
      <div class="stat"><div class="name">阅读后关注</div><div class="value" id="totalFollow">--</div></div>
      <div class="stat"><div class="name">平均关注率</div><div class="value" id="avgFollowRate">--</div><div class="note">阅读后关注人数/阅读量</div></div>
      <div class="stat"><div class="name">平均完读率</div><div class="value" id="avgCompletion">--</div></div>
    </section>

    <section class="grid">
      <div class="panel"><h2>粉丝增长趋势</h2><div class="chart"><canvas id="growthChart"></canvas></div></div>
      <div class="panel"><h2>传播渠道结构</h2><div class="chart short"><canvas id="channelChart"></canvas></div></div>
    </section>

    <section class="panel section">
      <h2>Top10 内容排行榜</h2>
      <div class="table-wrap"><table id="topTable"></table></div>
    </section>

    <section class="grid section">
      <div class="panel"><h2>研究方向表现</h2><div class="chart short"><canvas id="directionChart"></canvas></div></div>
      <div class="panel"><h2>内容类型表现</h2><div class="chart short"><canvas id="typeChart"></canvas></div></div>
    </section>

    <section class="strategy section">
      <div class="panel"><h2>内容策略结论</h2><ul class="list" id="insights"></ul></div>
      <div class="panel"><h2>内容与市场匹配度</h2><div class="fit">为电镜与材料研究者提供“看得懂、用得上的”前沿文献解读，面向电子显微学与二维材料等方向的研究生和科研人员，填补中文社区 TEM 前沿技术与材料科学交叉解读稀缺的空白。</div></div>
    </section>
  </main>

      const totals = { 推荐: 0, 搜一搜: 0, 聊天会话: 0, 朋友圈: 0, 公众号消息: 0, 其他: 0 };
      articles.forEach(a => { totals.推荐 += a.channels.recommend; totals.搜一搜 += a.channels.search; totals.聊天会话 += a.channels.chat; totals.朋友圈 += a.channels.moments; totals.公众号消息 += a.channels.msg; totals.其他 += a.channels.other + a.channels.home; });
      charts.channel = new Chart($('channelChart'), { type: 'doughnut', data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#07c160', '#2563eb', '#e89a18', '#d9486e', '#7c3aed', '#64748b'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
    }
    function renderTable(articles) {
      const key = $('rankBy').value;
      const rows = [...articles].sort((a, b) => b[key] - a[key]).slice(0, 10);
      $('topTable').innerHTML = '<thead><tr><th>排名</th><th>文章</th><th>日期</th><th>研究方向</th><th>阅读人数</th><th>分享人数</th><th>新增粉丝（阅读后关注）</th><th>关注率</th><th>阅读完成率</th><th>主流量来源</th></tr></thead><tbody>' + rows.map((a, i) => '<tr><td class="rank">#' + (i + 1) + '</td><td class="title-cell">' + short(a.title) + '</td><td>' + a.date + '</td><td><span class="pill">' + a.direction + '</span></td><td>' + fmt(a.read) + '</td><td>' + fmt(a.share) + '</td><td>' + fmt(a.follow) + '</td><td>' + pct(a.followRate) + '</td><td>' + pct(a.completionRate) + '</td><td>' + a.mainChannel + '</td></tr>').join('') + '</tbody>';
    }
    function renderInsights(articles) {
      const dirs = aggregate(articles, 'direction');
      const bestRead = dirs[0];
      const bestFollowRate = [...dirs].sort((a, b) => (b.follow / Math.max(b.read, 1)) - (a.follow / Math.max(a.read, 1)))[0];
      const bestCompletion = [...dirs].sort((a, b) => (b.completion / Math.max(b.count, 1)) - (a.completion / Math.max(a.count, 1)))[0];
      const topFollow = [...articles].sort((a, b) => b.follow - a.follow)[0];
      const items = [
        '阅读规模最高的方向是「' + (bestRead?.name || '--') + '」，贡献 ' + fmt(bestRead?.read || 0) + ' 阅读。',
        '真实涨粉效率最高的方向是「' + (bestFollowRate?.name || '--') + '」，平均关注率 ' + pct((bestFollowRate?.follow || 0) / Math.max(bestFollowRate?.read || 1, 1)) + '。',
        '平均完读率最高的方向是「' + (bestCompletion?.name || '--') + '」，说明该类内容承接质量更稳。',
        '当前涨粉最多的文章是「' + short(topFollow?.title || '--') + '」，新增粉丝 ' + fmt(topFollow?.follow || 0) + '，阅读 ' + fmt(topFollow?.read || 0) + '。'
      ];
      $('insights').innerHTML = items.map(x => '<li>' + x + '</li>').join('');
    }
    function render() {
      destroyCharts();
      const users = usersFiltered();
      const articles = articlesFiltered();
      renderStats(users, articles);
      renderGrowth(users);
      renderChannel(articles);
      renderTable(articles);
      renderDirection(articles);
      renderType(articles);
      renderInsights(articles);
    }
    setup();
  </script>
</body>
</html>
